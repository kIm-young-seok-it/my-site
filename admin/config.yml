backend:
  name: git-gateway
  branch: main

media_folder: "static/img"
public_folder: "/img"

locale: "ko"

collections:
  - name: "modules"
    label: "Modules"
    files:
      - file: "modules.json"
        label: "Modules JSON"
        name: "modules"
        fields:
          - label: "id"
            name: "id"
            widget: "string"
          - label: "title"
            name: "title"
            widget: "string"
          - label: "description"
            name: "description"
            widget: "text"
          - label: "path"
            name: "path"
            widget: "string"
          - label: "icon"
            name: "icon"
            widget: "string"
