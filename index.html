<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>My Site Hub</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .card { border: 1px solid #ddd; padding: 12px; margin: 8px 0; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>프로그램 목록</h1>
  <div id="list">로딩 중...</div>

  <script>
    async function loadModules(){
      try{
        const res = await fetch('modules.json');
        const data = await res.json();
        const list = document.getElementById('list');
        if(!data.modules || data.modules.length === 0){
          list.innerHTML = '<p>등록된 프로그램이 없습니다.</p>';
          return;
        }
        list.innerHTML = data.modules.map(m =>
          `<div class="card">
             <h3>${m.title}</h3>
             <p>${m.description}</p>
             <a href="${m.path}" target="_blank">열기</a>
           </div>`
        ).join('');
      }catch(e){
        document.getElementById('list').innerHTML = '<p>불러오기 실패</p>';
      }
    }
    loadModules();
  </script>
</body>
</html>
